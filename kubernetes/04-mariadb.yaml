# --- PARTE 1: El disco físico que falta (PersistentVolume) ---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: pv-mariadb-grupoa4
spec:
  storageClassName: manual  # Clase que pide tu PVC
  capacity:
    storage: 1Gi             # Tamaño suficiente para MariaDB
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  hostPath:
    path: "/mnt/data/mariadb" # Carpeta donde se guardarán los datos en el nodo
---
# --- PARTE 2: Tu Deployment original de MariaDB ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mariadb
  namespace: grupoa4
spec:
  selector:
    matchLabels:
      app: mariadb
  template:
    metadata:
      labels:
        app: mariadb
    spec:
      containers:
      - name: mariadb
        image: mariadb:10.5
        env:
        - name: MYSQL_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: db-secrets
              key: root_password
        - name: MYSQL_DATABASE
          valueFrom:
            secretKeyRef:
              name: db-secrets
              key: db_name
        ports:
        - containerPort: 3306
        volumeMounts:
        - name: mysql-persistent-storage
          mountPath: /var/lib/mysql
        - name: mysql-init
          mountPath: /docker-entrypoint-initdb.d
      volumes:
      - name: mysql-persistent-storage
        persistentVolumeClaim:
          claimName: grupoa4 # Este PVC ahora encontrará al PV de arriba
      - name: mysql-init
        configMap:
          name: mysql-init-script
---
# --- PARTE 3: Tu Service original ---
apiVersion: v1
kind: Service
metadata:
  name: mariadba4  # Nombre para resolución DNS interna
  namespace: grupoa4
spec:
  ports:
  - port: 3306
  selector:
    app: mariadb
  clusterIP: None # Headless service
