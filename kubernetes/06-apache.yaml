apiVersion: apps/v1
kind: Deployment
metadata:
  name: apache
  namespace: grupoa4
spec:
  replicas: 1
  selector:
    matchLabels:
      app: apache
  template:
    metadata:
      labels:
        app: apache
        env: grupoa4  # Añadido para consistencia con los logs
      annotations:
        # --- Configuración Elastic/Filebeat ---
        co.elastic.logs/enabled: "true"
        co.elastic.logs/module: apache
        # Nota: Si tu Apache escribe en stdout/stderr (como configuramos antes),
        # esta ruta interna podría no ser necesaria, pero la dejo según tu petición.
        co.elastic.logs.paths: /var/log/apache2/*.log
        co.elastic.logs.fileset.access.enabled: "true"
        co.elastic.logs.fileset.error.enabled: "true"
        # Ajustado a tus nombres reales:
        co.elastic.logs/processors.add_fields.fields.service: apache
        co.elastic.logs/processors.add_fields.fields.env: grupoa4
    spec:
      imagePullSecrets:
      - name: regcred
      containers:
      - name: apache
        image: grupo4a/apachea4:1.3
        imagePullPolicy: Always
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: apache-service
  namespace: grupoa4
spec:
  type: NodePort
  selector:
    app: apache
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30604
