ServerName localhost

LoadModule deflate_module /usr/local/apache2/modules/mod_deflate.so
LoadModule proxy_module /usr/local/apache2/modules/mod_proxy.so
LoadModule proxy_http_module /usr/local/apache2/modules/mod_proxy_http.so

<VirtualHost *:80>
    # --- 1. Rutas Originales (Restauradas) ---
    DocumentRoot /usr/local/apache2/htdocs/
    
    <Directory /usr/local/apache2/htdocs/>
        DirectoryIndex index.html
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>

    # --- 2. Proxies (Lógica de API y Archivos) ---
    # Proxy para la API
    ProxyPass /api/ http://pythona4:8080/api/
    ProxyPassReverse /api/ http://pythona4:8080/api/

    # Corrección de rutas para imágenes estáticas
    ProxyPass /archivos/ http://pythona4:8080/static/archivos/
    ProxyPassReverse /archivos/ http://pythona4:8080/static/archivos/
    
    # --- 3. Logs Avanzados (Del segundo bloque) ---
    LogFormat "%v %h %l %u %t \"%r\" %>s %b \"%{Referer}i\" \"%{User-Agent}i\" \"%{X-Forwarded-For}i\" %D" extended
    
    CustomLog /proc/self/fd/1 extended
    ErrorLog /proc/self/fd/2
    
    # Nivel de depuración máximo (útil para ver qué pasa con el proxy)
    LogLevel trace8
</VirtualHost>
